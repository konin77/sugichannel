<!DOCTYPE html>
{% load static %}
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購入画面</title>
    <link rel="stylesheet" type="text/css" href="{% static 'table.css' %}"/>
</head>
<body>
    <h1>購入完了</h1>
    <table>
    <tr>
        <th>商品名</th>
        <th>注文数</th>
    </tr>
    {% for detail in details %}
    <tr>
        <td>{{detail.item.name}}</td>
        <td>{{detail.amount}}</td>
    </tr>
    {% endfor %}
    </table>
    合計{{sum}}円<br>
    <form action="{% url 'shop0c:updatedestination' %}" method="POST">
    配送先：<input type="text" name="destination" value="{{new_purchase.user.address}}"><br>
            <input type="hidden" name="purchase_id" value="{{new_purchase.Purchase_id}}">
    <input type="submit" value="配送先変更">
    </form>
    <a href="{% url 'shop0c:main' %}">商品検索へ</a>
</body>
</html>
