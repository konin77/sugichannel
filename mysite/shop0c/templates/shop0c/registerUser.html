<!DOCTYPE html>
{% load static %}
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録画面</title>
    <link rel="stylesheet" type="text/css" href="{% static 'table.css' %}"/>
</head>
<body>
    <h1>会員情報を入力してください</h1>
    <br>
    <form action="{% url 'shop0c:registerUser' %}" method="POST">
        {% csrf_token %}
        <table>
            {% for register in form %}
                <tr>
                    <th>{{register.label}}</th>
                    <td>
                        {% if register.errors %}
                            <p class="error">{{ register.errors.0 }}</p>
                        {% endif %}
                        {{register}}
                    </td>
                </tr>
            {% endfor %}
            <tr>
                <td>
                    <div style="text-align:center">
                    <input type="submit" value="登録確認">
                    </div>
                </td>
            </tr>
            
        </table>
        
    </form>
    <br>
    <a href="{% url 'shop0c:main' %}">商品検索へ</a>
</body>
</html>
