{% extends 'shop0c/base.html' %}

{% block title %}会員情報の更新確認{% endblock %}

{% block content %}
<h1>以下の情報で更新しますか？</h1>

<div class="card narrow">
    <div class="card__body">
        <form action="{% url 'shop0c:updateConfirm' %}" method="POST">
            {% csrf_token %}
            <table>
                <tr>
                    <th>会員ID：</th>
                    <td>
                        {{user_id}}<input type="hidden" name="id" value="{{user_id}}">
                    </td>
                </tr>
                <tr>
                    <th>パスワード：</th>
                    <td>
                        {% for i in password%}
                            *
                        {% endfor %}<input type="hidden" name="password" value="{{password}}">
                    </td>
                </tr>
                <tr>
                    <th>お名前：</th>
                    <td>
                        {{name}}<input type="hidden" name="name" value="{{name}}">
                    </td>
                </tr>
                <tr>
                    <th>ご住所：</th>
                    <td>
                        {{address}}<input type="hidden" name="address" value="{{address}}">
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="form-actions">
                            <input type="submit" class="btn-square" value="変更">
                        </div>
                    </td>
                </tr>
            </table>
        </form>

        <p class="page-links"><a href="{% url 'shop0c:main' %}">商品検索へ</a></p>
    </div>
</div>
{% endblock %}
