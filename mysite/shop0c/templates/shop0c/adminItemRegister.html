{% extends 'shop0c/adminbase.html' %}

{% block title %}商品登録{% endblock %}

{% block content %}
<h1>商品登録</h1>

<div class="card narrow">
    <div class="card__body">
        {% if error %}
            <p>{{ error }}</p>
        {% endif %}

        <form action="{% url 'shop0c:item_register' %}" method="POST">
            {% csrf_token %}
            <table>
                {% for field in form %}
                <tr>
                    <th>{{ field.label }}</th>
                    <td>{{ field }}</td>
                    <td>{{ field.error }}</td>
                </tr>
                {% endfor %}
            </table>
            <div class="form-actions">
                <input type="submit" value="登録">
            </div>
        </form>

        <p class="page-links">
            <a href="{% url 'shop0c:item_list' %}">商品一覧へ</a>
            <a href="{% url 'shop0c:admin_main' %}">管理者メインページへ</a>
        </p>
    </div>
</div>
{% endblock %}
