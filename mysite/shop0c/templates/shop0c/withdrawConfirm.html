{% extends 'shop0c/base.html' %}

{% block title %}退会の確認{% endblock %}

{% block content %}
<h1>{{name}}さん、本当に退会しますか？</h1>

<div class="card narrow">
    <div class="card__body">
        <form action="{% url 'shop0c:delete' %}" method="POST">
            <div class="form-actions">
                <input type="submit" class="btn-square" value="退会">
            </div>
        </form>

        <p class="page-links"><a href="{% url 'shop0c:main' %}">商品検索へ</a></p>
    </div>
</div>
{% endblock %}
