<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果</title>
</head>
<body>
    <h1>キーワード"{{keyword}}"カテゴリ"{{category_name}}"の検索結果</h1>
    <table>
        
        <tr>
            <th>商品名</th>
            <th>商品の色</th>
            <th>メーカー名</th>
            <th>価格</th>
        </tr>
        <tr>
    {% for item in items %}
            <td>
                <a href="{% url 'shop0c:detail' pk=item.item_id %}">{{item.name}}</a>
            </td>
            <td>
                {{item.color}}
            </td>
            <td>
                {{item.manufacturer}}
            </td>
            <td>
                {{item.price}}
            </td>
        </tr>
    {% endfor %}
    </table>
    <br>
    <a href="{% url 'shop0c:main' %}">商品検索へ</a>
</body>
</html>
