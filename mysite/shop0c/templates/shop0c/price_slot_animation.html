{# --- 価格表示エリア --- #}
<div class="price-slot-wrap" id="priceSlotWrap" data-price="{{ price }}"></div>

{# --- JavaScript --- #}
<script>
(function () {
  function initSlot() {
    var wrap = document.getElementById("priceSlotWrap");
    if (!wrap) return;

    var ITEM_H = 54;
    var DURATION = 1800;   // 全体のアニメーション時間(ms)
    var STEPS = 80;        // カウントアップのステップ数 ← 増やすほど滑らか
    var START_DELAY = 300; // ページ表示後の待機時間(ms)

    var price = parseInt(wrap.dataset.price.replace(/[^0-9]/g, ""), 10);
    var digits = String(price).length;
    var digitEls = [];

    function zeroPad(num, len) {
      var s = String(num);
      while (s.length < len) s = "0" + s;
      return s;
    }

    function buildDisplay() {
      wrap.innerHTML = "";
      digitEls = [];
      var str = zeroPad(price, digits);
      Array.from(str).forEach(function () {
        var dw = document.createElement("div");
        dw.className = "price-slot-digit";
        var reel = document.createElement("div");
        reel.className = "price-slot-reel";
        for (var n = 0; n <= 9; n++) {
          var el = document.createElement("div");
          el.className = "price-slot-num";
          el.textContent = n;
          reel.appendChild(el);
        }
        dw.appendChild(reel);
        wrap.appendChild(dw);
        digitEls.push(reel);
      });
      var yen = document.createElement("span");
      yen.className = "price-slot-yen";
      yen.textContent = "円";
      wrap.appendChild(yen);
    }

    function setDigits(num) {
      var str = zeroPad(num, digits);
      Array.from(str).forEach(function (d, i) {
        digitEls[i].style.transition = "transform 80ms ease-out";
        digitEls[i].style.transform = "translateY(-" + (parseInt(d, 10) * ITEM_H) + "px)";
      });
    }

    function run() {
      buildDisplay();
      digitEls.forEach(function (reel) {
        reel.style.transition = "none";
        reel.style.transform = "translateY(0)";
      });

      setTimeout(function () {
        var step = 0;
        function tick() {
          step++;
          var progress = 1 - Math.pow(1 - step / STEPS, 3);
          var current = Math.round(price * progress);
          setDigits(current);
          if (step < STEPS) {
            var elapsed = (step / STEPS) * DURATION;
            var nextElapsed = ((step + 1) / STEPS) * DURATION;
            setTimeout(tick, nextElapsed - elapsed);
          }
        }
        tick();
      }, START_DELAY);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(run, START_DELAY);
      });
    } else {
      setTimeout(run, START_DELAY);
    }
  }

  initSlot();
})();
</script>
