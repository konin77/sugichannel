<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員情報の確認</title>
</head>
<body>
    <h1>会員情報</h1>
    <br>
    
        {% csrf_token %}
        <table>
                <tr>
                    <th>会員ID：</th>
                    <td>
                        {{user_id}}
                    </td>
                    
                </tr>
                <tr>
                    <th>パスワード：</th>
                    <td>
                        {{password}}
                    </td>
                    
                </tr>
                <tr>
                    <th>お名前：</th>
                    <td>
                        {{name}}
                    </td>
                    
                </tr>
                <tr>
                    <th>ご住所：</th>
                    <td>
                        {{address}}
                    </td>
                    
                </tr>
         
            
        </table>
        
   
    <br>
    <a href="{% url 'shop0c:updateUser' %}">会員情報の変更</a>
    <br>
    <a href="{% url 'shop0c:main' %}">商品検索へ</a>
</body>
</html>
