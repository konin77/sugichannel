{% extends 'shop0c/base.html' %}

{% block title %}会員情報の確認{% endblock %}

{% block content %}
<h1>会員情報</h1>

<div class="card narrow">
    <div class="card__body">
        {% csrf_token %}
        <table>
            <tr>
                <th>会員ID：</th>
                <td>
                    {{user_id}}
                </td>
            </tr>
            <tr>
                <th>パスワード：</th>
                <td>
                    表示しない
                </td>
            </tr>
            <tr>
                <th>お名前：</th>
                <td>
                    {{name}}
                </td>
            </tr>
            <tr>
                <th>ご住所：</th>
                <td>
                    {{address}}
                </td>
            </tr>
        </table>

        <p class="page-links">
            <a href="{% url 'shop0c:updateUser' %}">会員情報の変更</a>
            <a href="{% url 'shop0c:main' %}">商品検索へ</a>
        </p>
    </div>
</div>
{% endblock %}
