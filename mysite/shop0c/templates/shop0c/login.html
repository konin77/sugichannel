<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン画面</title>
</head>
<body>
    <h1>ログインしてください</h1>
    <br>
    <form action="{% url 'shop0c:main' %}" method="POST">
        {% csrf_token %}
        <table>
            {% for login in form %}
                <tr>
                    <th>{{login.label}}</th>
                    <td>
                        {% if login.errors %}
                            <p class="error">{{ login.errors.0 }}</p>
                        {% endif %}
                        {{login}}
                    </td>
                </tr>
            {% endfor %}
            <tr>
                <td>
                    <div style="text-align:center">
                    <input type="submit" value="ログイン">
                    </div>
                </td>
            </tr>
            
        </table>
        
    </form>
    <br>
    <a href="{% url 'shop0c:registerUser' %}">会員登録</a>
</body>
</html>
