{% extends 'shop0c/base.html' %}

{% block title %}ログイン{% endblock %}

{% block content %}
<h1>ログインしてください</h1>

<div class="card narrow">
    <div class="card__body">
        <form action="{% url 'shop0c:login' %}" method="POST">
            {% csrf_token %}
            {{s}}
            <table>
                {% for login in form %}
                    <tr>
                        <th>{{login.label}}</th>
                        <td>
                            {% if login.errors %}
                                <p class="error">{{ login.errors.0 }}</p>
                            {% endif %}
                            {{login}}
                        </td>
                    </tr>
                {% endfor %}
                <tr>
                    <td>
                        <div class="form-actions">
                            <input type="submit" class="btn-square" value="ログイン">
                        </div>
                    </td>
                </tr>
            </table>
        </form>

        <p class="page-links"><a href="{% url 'shop0c:registerUser' %}">会員登録</a></p>
    </div>
</div>
{% endblock %}
