<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ショッピングカート</title>
</head>
<body>
    <table>
        <tr>
            <th>商品名</th>
            <th>商品の色</th>
            <th>メーカー名</th>
            <th>単価</th>
            <th>数量</th>
        </tr>
        {% for cart in carts %}
        <tr>
            <td>{{cart.item.name}}</td>
            <td>{{cart.item.color}}</td>
            <td>{{cart.item.manufacturer}}</td>
            <td>{{cart.item.price}}</td>
            <td>{{cart.amount}}</td>
        </tr>
        {% endfor %}
    </table>
    合計{{sum}}円
    <form>
        <input type="submit" value="購入する（任意機能）">
    </form>
    <a href="{% url 'shop0c:main' %}">商品検索へ</a>
</body>
</html>
