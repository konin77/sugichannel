{% extends 'shop0c/base.html' %}

{% block title %}商品数の修正{% endblock %}

{% block content %}
<h1>商品の購入数修正</h1>

<div class="card">
    <div class="card__body">
        <table>
            <tr>
                <th>商品名</th>
                <td>{{cart.item.name}}</td>
            </tr>
            <tr>
                <th>商品の色</th>
                <td>{{cart.item.color}}</td>
            </tr>
            <tr>
                <th>メーカー名</th>
                <td>{{cart.item.manufacturer}}</td>
            </tr>
            <tr>
                <th>価格</th>
                <td>{{cart.item.price}}</td>
            </tr>
            <tr>
                <th>在庫数</th>
                <td>{{cart.item.stock}}</td>
            </tr>
        </table>

        <form class="cart-form" action="{% url 'shop0c:updatecart' %}" method="POST">
            <input type="hidden" name="id" value="{{id}}">
            <div class="field field--qty">
                <label for="amounts">数量：</label>
                <select name="amount" id="amounts">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
            <input type="submit" class="btn-cart" value="ショッピングカートに入れる">
        </form>
    </div>
</div>

<div class="page-actions">
    <a class="link-btn" href="{% url 'shop0c:main' %}">← 商品検索へ</a>
</div>
{% endblock %}
